worker_processes auto;
events { worker_connections 1024; }

http {
    # Docker internal DNS — resolves variables in proxy_pass at request time.
    # This prevents nginx from crashing when auth container starts after nginx.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ─────────────────────────────────────────
    # Upstream servers (api + frontend start before nginx, safe to use here)
    # ─────────────────────────────────────────
    upstream api_servers {
        server api:8080;
        keepalive 32;
    }

    upstream frontend_servers {
        server frontend:3000;
        keepalive 16;
    }

    # ─────────────────────────────────────────
    # Rate limiting
    # ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=search:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;

    # ─────────────────────────────────────────
    # Gzip compression
    # ─────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json text/css application/javascript;
    gzip_min_length 1000;

    # ─────────────────────────────────────────
    # Main server
    # ─────────────────────────────────────────
    server {
        listen 80;
        server_name localhost angkorsearch.com.kh www.angkorsearch.com.kh;

        # auth backend as a variable so Docker DNS resolves it at request time
        # (avoids "host not found" crash on startup when auth is not yet ready)
        set $auth_backend "http://auth:8081";

        # Avatar images — served directly by nginx from shared volume
        location /avatars/ {
            alias /srv/avatars/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options nosniff;
        }

        # Auth routes → Go auth service
        # NOTE: proxy_pass uses bare $auth_backend (no URI path).
        # With a variable, nginx forwards the original request path unchanged.
        location /auth/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         $auth_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_set_header   Cookie            $http_cookie;
            proxy_pass_header  Set-Cookie;
        }

        # Auth admin API routes (specific sub-resources only) → Go auth service
        # Regex takes priority over prefix — only known API paths go to auth.
        # /admin and /admin/ (the Next.js admin page) fall through to location /
        location ~ ^/admin/(users|roles|permissions|sessions) {
            limit_req zone=api burst=10 nodelay;
            proxy_pass         $auth_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_set_header   Cookie            $http_cookie;
            proxy_pass_header  Set-Cookie;
        }

        # Next.js SSE API routes → frontend (crawl-stream + auto-discover)
        location ~ ^/api/(crawl-stream|auto-discover)(/|$) {
            proxy_pass         http://frontend_servers;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 180s;
            proxy_buffering    off;
            add_header         X-Accel-Buffering no;
        }

        # API routes → C++ API server
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://api_servers/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # Crawl status/stream — allow long-polling
        location /api/admin/crawl-status {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://api_servers/admin/crawl-status;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Connection        "";
            proxy_read_timeout 90s;
        }

        # Search endpoint — stricter rate limit
        location /api/search {
            limit_req zone=search burst=10 nodelay;
            proxy_pass http://api_servers/search;
        }

        # Frontend → Next.js
        location / {
            proxy_pass         http://frontend_servers;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade     $http_upgrade;
            proxy_set_header   Connection  "upgrade";
            proxy_set_header   Host        $host;
        }

        # Health check
        location /health {
            return 200 'AngkorSearch OK';
            add_header Content-Type text/plain;
        }
    }
}
