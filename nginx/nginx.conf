worker_processes auto;
events { worker_connections 1024; }

http {
    # ─────────────────────────────────────────
    # Upstream servers
    # ─────────────────────────────────────────
    upstream api_servers {
        server api:8080;
        keepalive 32;
    }

    upstream frontend_servers {
        server frontend:3000;
        keepalive 16;
    }

    # ─────────────────────────────────────────
    # Rate limiting — protect from abuse
    # ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=search:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;

    # ─────────────────────────────────────────
    # Gzip compression
    # ─────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json text/css application/javascript;
    gzip_min_length 1000;

    # ─────────────────────────────────────────
    # Main server
    # ─────────────────────────────────────────
    server {
        listen 80;
        server_name localhost angkorsearch.com.kh www.angkorsearch.com.kh;

        # API routes → C++ API server
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://api_servers/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";

            # Cache search results for 60 seconds
            proxy_cache_valid 200 60s;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Search endpoint — rate limited
        location /api/search {
            limit_req zone=search burst=10 nodelay;
            proxy_pass http://api_servers/search;
        }

        # Frontend → Next.js
        location / {
            proxy_pass         http://frontend_servers;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade     $http_upgrade;
            proxy_set_header   Connection  "upgrade";
            proxy_set_header   Host        $host;
        }

        # Health check
        location /health {
            return 200 'AngkorSearch OK';
            add_header Content-Type text/plain;
        }
    }
}
