
# ============================================================
#  AngkorSearch v2 — Full Docker Compose
#  Services: postgres, redis, crawler, api, frontend, nginx
#  Data stored in ./storage/ — never lost!
# ============================================================

networks:
  angkor_net:
    driver: bridge

services:

  # ─────────────────────────────────────────
  # PostgreSQL — main database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: angkor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       angkorsearch
      POSTGRES_USER:     angkor
      POSTGRES_PASSWORD: angkor_secret_2024
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data   # permanent storage
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - angkor_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U angkor -d angkorsearch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis — caching + sessions
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: angkor_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - ./storage/redis:/data                          # permanent storage
    ports:
      - "6379:6379"
    networks:
      - angkor_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Crawler — C++ mega crawler
  # Crawls: web, news, images, videos, GitHub
  # ─────────────────────────────────────────
  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: angkor_crawler
    restart: unless-stopped
    environment:
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      angkorsearch
      DB_USER:      angkor
      DB_PASS:      angkor_secret_2024
      REDIS_HOST:   redis
      REDIS_PORT:   6379
      MAX_PAGES:    500000
      CRAWL_DELAY:  800
      # Optional: add your GitHub token for 5000 req/hour instead of 60
      GITHUB_TOKEN: ""
    volumes:
      - ./storage/html:/app/data/html                  # permanent HTML storage
      - ./data/dict:/app/data/dict
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - angkor_net

  # ─────────────────────────────────────────
  # API — C++ HTTP search API
  # ─────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: angkor_api
    restart: unless-stopped
    environment:
      DB_HOST:    postgres
      DB_PORT:    5432
      DB_NAME:    angkorsearch
      DB_USER:    angkor
      DB_PASS:    angkor_secret_2024
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT:   8080
    volumes:
      - ./storage/index:/app/data/index                # permanent index storage
      - ./data/dict:/app/data/dict
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - angkor_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Frontend — Next.js UI
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: angkor_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api
    networks:
      - angkor_net

  # ─────────────────────────────────────────
  # Nginx — reverse proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: angkor_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
      - frontend
    networks:
      - angkor_net