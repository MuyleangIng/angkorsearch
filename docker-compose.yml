# ============================================================
#  AngkorSearch v2.2 — Docker Compose
#  New in v2.2:
#   • ollama service  — local LLM (qwen2.5:3b by default)
#   • ollama-init     — auto-pulls the model on first run
#   • storage/ollama  — persists model weights
# ============================================================

networks:
  angkor_net:
    driver: bridge

services:

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: angkor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       angkorsearch
      POSTGRES_USER:     angkor
      POSTGRES_PASSWORD: angkor_secret_2024
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - angkor_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U angkor -d angkorsearch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: angkor_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - ./storage/redis:/data
    ports:
      - "6379:6379"
    networks:
      - angkor_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Ollama — local LLM server
  # Default model: qwen2.5:3b (~2GB, multilingual, supports Khmer)
  # To use GPU: uncomment the deploy section below
  # ─────────────────────────────────────────
  ollama:
    image: ollama/ollama
    container_name: angkor_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./storage/ollama:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    networks:
      - angkor_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    # Uncomment to enable NVIDIA GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Auto-pulls the LLM model when Ollama first starts
  ollama-init:
    image: ollama/ollama
    container_name: angkor_ollama_init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull qwen2.5:3b && echo 'Model ready!'"]
    networks:
      - angkor_net

  # ─────────────────────────────────────────
  # Crawler Node 1 — seeds queue + crawls
  # ─────────────────────────────────────────
  crawler_1:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: angkor_crawler_1
    restart: unless-stopped
    environment:
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      angkorsearch
      DB_USER:      angkor
      DB_PASS:      angkor_secret_2024
      REDIS_HOST:   redis
      REDIS_PORT:   6379
      MAX_PAGES:    5000
      CRAWL_DELAY:  200
      N_THREADS:    8
      NODE_ID:      "1"
      GITHUB_TOKEN: ""
    volumes:
      - ./storage/html:/app/data/html
      - ./data/dict:/app/data/dict
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - angkor_net

  # ─────────────────────────────────────────
  # Crawler Node 2
  # ─────────────────────────────────────────
  crawler_2:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: angkor_crawler_2
    restart: unless-stopped
    environment:
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      angkorsearch
      DB_USER:      angkor
      DB_PASS:      angkor_secret_2024
      REDIS_HOST:   redis
      REDIS_PORT:   6379
      MAX_PAGES:    5000
      CRAWL_DELAY:  200
      N_THREADS:    8
      NODE_ID:      "2"
      GITHUB_TOKEN: ""
    volumes:
      - ./storage/html:/app/data/html
      - ./data/dict:/app/data/dict
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - angkor_net

  # ─────────────────────────────────────────
  # Crawler Node 3
  # ─────────────────────────────────────────
  crawler_3:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: angkor_crawler_3
    restart: unless-stopped
    environment:
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      angkorsearch
      DB_USER:      angkor
      DB_PASS:      angkor_secret_2024
      REDIS_HOST:   redis
      REDIS_PORT:   6379
      MAX_PAGES:    5000
      CRAWL_DELAY:  200
      N_THREADS:    8
      NODE_ID:      "3"
      GITHUB_TOKEN: ""
    volumes:
      - ./storage/html:/app/data/html
      - ./data/dict:/app/data/dict
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - angkor_net

  # ─────────────────────────────────────────
  # Crawler Node 4
  # ─────────────────────────────────────────
  crawler_4:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: angkor_crawler_4
    restart: unless-stopped
    environment:
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      angkorsearch
      DB_USER:      angkor
      DB_PASS:      angkor_secret_2024
      REDIS_HOST:   redis
      REDIS_PORT:   6379
      MAX_PAGES:    5000
      CRAWL_DELAY:  200
      N_THREADS:    8
      NODE_ID:      "4"
      GITHUB_TOKEN: ""
    volumes:
      - ./storage/html:/app/data/html
      - ./data/dict:/app/data/dict
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - angkor_net

  # ─────────────────────────────────────────
  # API — C++ HTTP server
  # ─────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: angkor_api
    restart: unless-stopped
    environment:
      DB_HOST:       postgres
      DB_PORT:       5432
      DB_NAME:       angkorsearch
      DB_USER:       angkor
      DB_PASS:       angkor_secret_2024
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      API_PORT:      8080
      OLLAMA_HOST:   http://ollama:11434
      OLLAMA_MODEL:  qwen2.5:3b
    volumes:
      - ./storage/index:/app/data/index
      - ./data/dict:/app/data/dict
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - angkor_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Frontend — Next.js 14 TypeScript
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./angkorsearch-web
      dockerfile: Dockerfile
    container_name: angkor_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - angkor_net

  # ─────────────────────────────────────────
  # Nginx — reverse proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: angkor_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
      - frontend
    networks:
      - angkor_net
